<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }

        /* Container Layout Overlay */
        .layout-overlay {
            position: absolute;
            z-index: 1000;
            pointer-events: none;
            width: 100%;
            height: 100%;
        }

        .layout-element {
            pointer-events: auto;
            background: white;
            border: 2px solid black;
            padding: 10px;
            font-family: Arial, sans-serif;
            box-shadow: 3px 3px 8px rgba(0,0,0,0.4);
        }

        /* Judul Peta */
        #map-title {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            text-align: center;
        }

        /* Container Kanan Bawah (Mata Angin & Legenda) */
        #right-bottom-container {
            position: absolute;
            bottom: 30px;
            right: 20px;
            width: 260px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Desain Mata Angin Bagus */
        #north-arrow-box {
            background: white;
            border: 2px solid black;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
        }

        #map-legend {
            width: 100%;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-top: 8px;
            font-size: 14px;
        }

        .color-box {
            width: 25px;
            height: 18px;
            margin-right: 12px;
            border: 1px solid #232323;
        }
        </style>
        <title>Peta Kelurahan Pangala Utara</title>
    </head>
    <body>
        
        <div class="layout-overlay">
            
            <div id="map-title" class="layout-element">
                <h2 style="margin:0; font-size: 18px; letter-spacing: 1px;">PETA KELURAHAN PANGALA UTARA</h2>
            </div>

            <div id="right-bottom-container">
                
                <div id="north-arrow-box" class="layout-element">
                    <svg width="100" height="100" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="35" fill="none" stroke="black" stroke-width="1"/>
                        
                        <path d="M50 15 L55 50 L50 48 L45 50 Z" fill="black"/> <path d="M50 85 L55 50 L50 52 L45 50 Z" fill="#ccc" stroke="black"/> <path d="M85 50 L50 45 L52 50 L50 55 Z" fill="#666" stroke="black"/> <path d="M15 50 L50 45 L48 50 L50 55 Z" fill="#eee" stroke="black"/> <text x="50" y="12" text-anchor="middle" font-size="12" font-weight="bold">U</text>
                        <text x="50" y="98" text-anchor="middle" font-size="10">S</text>
                        <text x="92" y="54" text-anchor="start" font-size="10">T</text>
                        <text x="8" y="54" text-anchor="end" font-size="10">B</text>
                        
                        <text x="82" y="25" font-size="7">TL</text>
                        <text x="82" y="80" font-size="7">TG</text>
                        <text x="10" y="80" font-size="7">BD</text>
                        <text x="10" y="25" font-size="7">BL</text>

                        <circle cx="50" cy="50" r="2" fill="black"/>
                    </svg>
                </div>

                <div id="map-legend" class="layout-element">
                    <div style="font-weight: bold; border-bottom: 2px solid black; margin-bottom: 8px; padding-bottom: 3px;">LEGENDA :</div>
                    
                    <div class="legend-item">
                        <div class="color-box" style="background-color: rgba(231,113,72,0.58);"></div>
                        <span>Kelurahan Pangala Utara</span>
                    </div>

                    <div style="margin-top: 20px; border-top: 1px solid black; padding-top: 8px; font-size: 11px;">
                        Disusun Oleh:<br>
                        <span style="font-weight: bold; font-size: 13px;">YAFET SAMBARA</span><br>
                        NIM: 241011060048
                    </div>
                </div>

            </div>
        </div>

        <div id="map"></div>

        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="data/KelurahanPangalaUtara_2.js"></script>
        
        <script>
        var map = L.map('map', {
            zoomControl:true, maxZoom:28, minZoom:1
        }).fitBounds([[-2.9045030339633464,119.79565065162859],[-2.8832359087777593,119.82928815463046]]);
        
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('qgis2web &middot; Leaflet &middot; QGIS');

        // Basemap Google Satellite
        map.createPane('pane_GoogleSatelit_1');
        map.getPane('pane_GoogleSatelit_1').style.zIndex = 401;
        var layer_GoogleSatelit_1 = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            pane: 'pane_GoogleSatelit_1',
            opacity: 1.0,
            minZoom: 1,
            maxZoom: 28,
        });
        map.addLayer(layer_GoogleSatelit_1);

        // Data Layer Kelurahan
        function style_KelurahanPangalaUtara_2_0() {
            return {
                pane: 'pane_KelurahanPangalaUtara_2',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                weight: 1.5, 
                fill: true,
                fillOpacity: 0.6,
                fillColor: 'rgba(231,113,72,1.0)',
                interactive: true,
            }
        }

        map.createPane('pane_KelurahanPangalaUtara_2');
        map.getPane('pane_KelurahanPangalaUtara_2').style.zIndex = 402;
        
        var layer_KelurahanPangalaUtara_2 = new L.geoJson(json_KelurahanPangalaUtara_2, {
            pane: 'pane_KelurahanPangalaUtara_2',
            style: style_KelurahanPangalaUtara_2_0,
            onEachFeature: function(feature, layer) {
                if (feature.properties && feature.properties.NAMOBJ) {
                    layer.bindPopup("<strong>Kelurahan:</strong> " + feature.properties.NAMOBJ);
                }
            }
        });
        map.addLayer(layer_KelurahanPangalaUtara_2);
        </script>
    </body>
</html>
